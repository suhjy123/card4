<head>
  <meta charset="UTF-8" />

  <title>&#49436;&#51648;&#50672; | &#50937; &#47749;&#54632;</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"

  <style>
    :root {
      --card-bg: #ffffff;
      --text-main: #182230;
      --text-sub: #596779;
      --accent: #1f3f72;
      --line: #dbe3ee;
      --shadow: 0 22px 50px rgba(15, 31, 56, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans KR", "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      color: var(--text-main);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 28px;
      background:
        radial-gradient(circle at 14% 18%, rgba(31, 63, 114, 0.08), transparent 36%),
        radial-gradient(circle at 88% 82%, rgba(31, 63, 114, 0.07), transparent 42%),
        repeating-linear-gradient(
          135deg,
          rgba(24, 34, 48, 0.035) 0 1px,
          transparent 1px 14px
        ),
        linear-gradient(145deg, #ffffff, #f6f9ff);
      border-radius: 22px;
      border: 1px solid #e4eaf3;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .profile-image {
      width: 100%;
      aspect-ratio: 1 / 1.25;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(19, 35, 61, 0.12);
    }

    .card-body {
      display: grid;
      align-content: center;
    }

    .name {
      margin: 0;
      font-size: 2.1rem;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .job {
      margin: 10px 0 0;
      color: var(--accent);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .intro {
      margin: 16px 0 0;
      color: var(--text-sub);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--line), rgba(219, 227, 238, 0.28));
      margin: 22px 0 14px;
    }

    .contact-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .contact-list li {
      display: grid;
      grid-template-columns: 64px 1fr;
      align-items: center;
      gap: 12px;
    }

    .label {
      color: var(--text-sub);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .contact-list a {
      color: var(--text-main);
      text-decoration: none;
      word-break: break-all;
      font-weight: 500;
    }

    .contact-list a:hover {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .button-group {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #c9d5e7;
      background: #f7f9fd;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
      transition: all 0.2s ease;
    }

    .action-button:hover {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      .card {
        grid-template-columns: 1fr;
        max-width: 380px;
        gap: 18px;
        padding: 22px;
      }

      .profile-image {
        max-height: 300px;
      }

      .button-group {
        gap: 8px;
      }

      .action-button {
        width: 100%;
      }
    }
  </style>
</head>
